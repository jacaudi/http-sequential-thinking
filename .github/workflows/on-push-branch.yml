---
name: On Branch Push

on:
  push:
    branches:
      - '**'
      - '!main'
      - '!renovate/**'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Tests
        uses: ./.github/actions/tests